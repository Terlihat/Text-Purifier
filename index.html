<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Purifier Pro | v1.2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #e0e6ed;
            --bg-input: #f8fafc;
            --primary: #3498db;
            --primary-hover: #2980b9;
            --success: #10b981;
            --success-hover: #059669;
            --accent-red: #e74c3c;
            --accent-red-bg: #ffeaea;
            --accent-red-hover: #ffcece;
            --shadow: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --bg-input: #0f172a;
            --primary: #38bdf8;
            --primary-hover: #7dd3fc;
            --success: #34d399;
            --success-hover: #10b981;
            --accent-red: #f87171;
            --accent-red-bg: #451a1a;
            --accent-red-hover: #652222;
            --shadow: rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--bg-card);
            width: 100%;
            max-width: 950px;
            border-radius: 16px;
            box-shadow: 0 10px 30px var(--shadow);
            padding: 30px;
            position: relative;
        }

        /* Header & Theme Toggle */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .version-badge {
            font-size: 0.75rem;
            background: var(--primary);
            color: #0f172a;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
            vertical-align: middle;
            margin-left: 8px;
        }

        .theme-toggle {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Opsi Konfigurasi */
        .options-panel {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .options-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .checkbox-group, .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .radio-group {
            display: flex;
            gap: 15px;
        }

        /* Find & Replace Custom Input */
        .replace-tools {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mini-input {
            width: 110px;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 0.85rem;
        }

        .mini-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Text Area Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .options-panel { flex-direction: column; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        label.main-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .file-upload-btn {
            font-size: 0.75rem;
            background: var(--border-color);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .file-upload-btn:hover {
            background: var(--primary);
            color: white;
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            resize: none;
            font-size: 1rem;
            color: var(--text-main);
            background-color: var(--bg-input);
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .counter-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
            padding: 0 4px;
        }

        /* Aksi Utama */
        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .action-right {
            display: flex;
            gap: 10px;
        }

        button.btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-clear { background-color: var(--accent-red-bg); color: var(--accent-red); }
        .btn-clear:hover { background-color: var(--accent-red-hover); }

        .btn-copy { background-color: var(--primary); color: #0f172a; }
        .btn-copy:hover { background-color: var(--primary-hover); }

        .btn-download { background-color: var(--success); color: white; }
        .btn-download:hover { background-color: var(--success-hover); }

        /* Notifikasi Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            z-index: 999;
        }
        #toast.show { opacity: 1; visibility: visible; transform: translateY(0); }
    </style>
</head>
<body data-theme="light">

    <div class="container">
        <div class="header-area">
            <h1>Text Purifier <span class="version-badge">v1.2.0</span></h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
        </div>

        <div class="options-panel">
            <div class="options-group">
                <div class="options-title">Filter Utama</div>
                <label class="checkbox-group"><input type="checkbox" id="keepSpaces" checked> Pertahankan Spasi</label>
                <label class="checkbox-group"><input type="checkbox" id="removeNumbers"> Hapus Angka</label>
            </div>

            <div class="options-group">
                <div class="options-title">Format Huruf</div>
                <div class="radio-group">
                    <label><input type="radio" name="textCase" value="normal" checked> Normal</label>
                    <label><input type="radio" name="textCase" value="upper"> BESAR</label>
                    <label><input type="radio" name="textCase" value="lower"> kecil</label>
                </div>
            </div>

            <div class="options-group">
                <div class="options-title">Cari & Ganti (Opsional)</div>
                <div class="replace-tools">
                    <input type="text" id="findText" placeholder="Cari (cth: @)" class="mini-input">
                    <span style="color: var(--text-muted);">➔</span>
                    <input type="text" id="replaceText" placeholder="Ganti (cth: a)" class="mini-input">
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="input-group">
                <div class="input-header">
                    <label class="main-label">Teks Asli</label>
                    <label for="fileUpload" class="file-upload-btn">📂 Unggah .txt</label>
                    <input type="file" id="fileUpload" accept=".txt" style="display: none;">
                </div>
                <textarea id="inputText" placeholder="Ketik, tempel, atau unggah file teks Anda di sini..."></textarea>
                <div class="counter-bar">
                    <span id="srcChars">0 Karakter</span>
                    <span id="srcWords">0 Kata</span>
                </div>
            </div>
            
            <div class="input-group">
                <div class="input-header">
                    <label class="main-label">Hasil Bersih</label>
                </div>
                <textarea id="outputText" readonly placeholder="Hasil teks bersih otomatis muncul di sini..."></textarea>
                <div class="counter-bar">
                    <span id="outChars">0 Karakter</span>
                    <span id="outWords">0 Kata</span>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-clear" onclick="clearText()">Hapus Semua</button>
            <div class="action-right">
                <button class="btn btn-copy" onclick="copyText()">Salin Teks</button>
                <button class="btn btn-download" onclick="downloadText()">⬇️ Unduh .txt</button>
            </div>
        </div>
    </div>

    <div id="toast" id="toastMsg">Teks berhasil disalin! ✅</div>

    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const keepSpaces = document.getElementById('keepSpaces');
        const removeNumbers = document.getElementById('removeNumbers');
        const caseOptions = document.getElementsByName('textCase');
        const findText = document.getElementById('findText');
        const replaceText = document.getElementById('replaceText');
        const fileUpload = document.getElementById('fileUpload');
        const toast = document.getElementById('toast');
        const body = document.body;
        const themeBtn = document.getElementById('themeBtn');

        // Fungsi Penghitung Statistik
        function updateStats(text, charId, wordId) {
            const charCount = text.length;
            const wordCount = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
            document.getElementById(charId).innerText = `${charCount} Karakter`;
            document.getElementById(wordId).innerText = `${wordCount} Kata`;
        }

        // Fungsi Utama Pembersih Teks
        function purifyText() {
            let text = inputText.value;

            // 1. Fitur Cari & Ganti (dieksekusi sebelum filter simbol)
            const findStr = findText.value;
            const repStr = replaceText.value;
            if (findStr) {
                // Escape regex agar simbol spesial tidak merusak kode
                const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const findRegex = new RegExp(escapeRegExp(findStr), 'g');
                text = text.replace(findRegex, repStr);
            }

            // 2. Membangun Regex Filter Simbol
            let regexStr = '[^a-zA-Z';
            if (!removeNumbers.checked) regexStr += '0-9';
            if (keepSpaces.checked) regexStr += '\\s';
            regexStr += ']';
            
            const regex = new RegExp(regexStr, 'g');
            let cleanedText = text.replace(regex, '');

            // 3. Mengatur Kapitalisasi Teks
            let selectedCase = 'normal';
            for (const radio of caseOptions) {
                if (radio.checked) { selectedCase = radio.value; break; }
            }
            if (selectedCase === 'upper') cleanedText = cleanedText.toUpperCase();
            else if (selectedCase === 'lower') cleanedText = cleanedText.toLowerCase();

            outputText.value = cleanedText;

            // Update Statistik
            updateStats(inputText.value, 'srcChars', 'srcWords');
            updateStats(cleanedText, 'outChars', 'outWords');
        }

        // Event Listeners Input & Opsi
        inputText.addEventListener('input', purifyText);
        keepSpaces.addEventListener('change', purifyText);
        removeNumbers.addEventListener('change', purifyText);
        findText.addEventListener('input', purifyText);
        replaceText.addEventListener('input', purifyText);
        caseOptions.forEach(radio => radio.addEventListener('change', purifyText));

        // Fitur Baca File Upload .txt
        fileUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                inputText.value = e.target.result;
                purifyText();
                showToast("File berhasil dimuat! 📂");
            };
            reader.readAsText(file);
        });

        // Fitur Download File .txt
        function downloadText() {
            const text = outputText.value;
            if (!text) {
                showToast("Tidak ada teks untuk diunduh ❌");
                return;
            }
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'teks_bersih.txt';
            a.click();
            showToast("File berhasil diunduh! ⬇️");
        }

        // Fungsi Menghapus Teks
        function clearText() {
            inputText.value = '';
            outputText.value = '';
            findText.value = '';
            replaceText.value = '';
            fileUpload.value = '';
            purifyText();
            inputText.focus();
        }

        // Fungsi Copy
        function copyText() {
            if (outputText.value === '') return;
            navigator.clipboard.writeText(outputText.value).then(() => {
                showToast("Teks berhasil disalin! ✅");
            });
        }

        // Notifikasi Toast Dinamis
        function showToast(message) {
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        // Toggle Tema Dark/Light
        function toggleTheme() {
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                themeBtn.innerHTML = '☀️ Light Mode';
            } else {
                body.setAttribute('data-theme', 'light');
                themeBtn.innerHTML = '🌙 Dark Mode';
            }
        }
    </script>
</body>
</html>
