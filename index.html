<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Purifier Pro | v3.0.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #e0e6ed;
            --bg-input: #f8fafc;
            --primary: #3498db;
            --primary-hover: #2980b9;
            --success: #10b981;
            --success-hover: #059669;
            --warning: #f59e0b;
            --warning-hover: #d97706;
            --pdf-color: #8b5cf6;
            --pdf-hover: #7c3aed;
            --accent-red: #e74c3c;
            --accent-red-bg: #ffeaea;
            --accent-red-hover: #ffcece;
            --shadow: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --bg-input: #0f172a;
            --primary: #38bdf8;
            --primary-hover: #7dd3fc;
            --success: #34d399;
            --success-hover: #10b981;
            --warning: #fbbf24;
            --warning-hover: #f59e0b;
            --pdf-color: #a78bfa;
            --pdf-hover: #8b5cf6;
            --accent-red: #f87171;
            --accent-red-bg: #451a1a;
            --accent-red-hover: #652222;
            --shadow: rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--bg-card);
            width: 100%;
            max-width: 1200px;
            border-radius: 16px;
            box-shadow: 0 10px 30px var(--shadow);
            padding: 30px;
            position: relative;
        }

        /* Header */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .version-badge {
            font-size: 0.75rem;
            background: var(--border-color);
            color: var(--text-muted);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .theme-toggle {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Opsi Konfigurasi */
        .options-panel {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: flex-start;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .options-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 20px;
        }

        .checkbox-group, .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* Custom Inputs */
        .flex-tools {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mini-input {
            width: 110px;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 0.85rem;
        }

        .mini-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .wide-input { width: 180px; }
        .number-input { width: 80px; }
        select.mini-input { cursor: pointer; height: 35px; }

        /* Text Area Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            min-height: 38px; 
        }

        label.main-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .tools-group {
            display: flex;
            gap: 8px;
        }

        .small-btn {
            font-size: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .small-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .truncate-btn {
            background-color: var(--accent-red-bg);
            color: var(--accent-red);
            border-color: var(--accent-red);
            display: none;
            animation: fadeIn 0.3s;
        }
        
        .truncate-btn:hover { background-color: var(--accent-red); color: white; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .mic-btn.listening {
            background-color: var(--accent-red-bg);
            color: var(--accent-red);
            border-color: var(--accent-red);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        textarea {
            width: 100%;
            height: 280px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            resize: none;
            font-size: 16px; 
            color: var(--text-main);
            background-color: var(--bg-input);
            line-height: 1.6;
        }

        textarea:focus { outline: none; border-color: var(--primary); }

        .counter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
            padding: 0 4px;
        }

        .reading-time {
            color: var(--text-muted);
            font-weight: 500;
            background: var(--bg-body);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .autosave-badge {
            color: var(--success);
            font-size: 0.75rem;
            font-weight: 500;
            display: none;
        }
        
        .char-limit-warning { color: var(--accent-red) !important; font-weight: bold; }

        /* Panels Grid */
        .panels-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }
        
        @media (max-width: 800px) { .panels-grid { grid-template-columns: 1fr; } }

        .data-panel {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
        }

        .density-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .word-badge {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .word-count {
            background: var(--primary);
            color: #0f172a;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* History Log */
        .history-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .history-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 10px 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }
        .history-item:hover { border-color: var(--primary); }
        .history-text-preview { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%; cursor: pointer; }
        .history-text-preview:hover { color: var(--primary); }
        .history-meta { display: flex; align-items: center; gap: 10px; }
        .history-btn { background: none; border: none; cursor: pointer; font-size: 0.9rem; opacity: 0.7; }
        .history-btn:hover { opacity: 1; }

        /* Aksi Utama */
        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .action-right { display: flex; flex-wrap: wrap; gap: 10px; }

        button.btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-clear { background-color: var(--accent-red-bg); color: var(--accent-red); }
        .btn-clear:hover { background-color: var(--accent-red-hover); }
        .btn-copy { background-color: var(--primary); color: #0f172a; }
        .btn-copy:hover { background-color: var(--primary-hover); }
        .btn-download { background-color: var(--success); color: white; }
        .btn-download:hover { background-color: var(--success-hover); }
        .btn-pdf { background-color: var(--pdf-color); color: white; }
        .btn-pdf:hover { background-color: var(--pdf-hover); }
        .btn-save { background-color: var(--warning); color: #0f172a; }
        .btn-save:hover { background-color: var(--warning-hover); }

        /* Footer & Author Section */
        .app-footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px dashed var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .author-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .author-name {
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .social-links {
            display: flex;
            gap: 15px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            color: var(--text-muted);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-link svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .social-link:hover {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }
    </style>
</head>
<body data-theme="light">

    <div class="container">
        <div class="header-area">
            <h1>Text Purifier <span class="version-badge">v3.0.3 Pro</span></h1>
            <div class="header-controls">
                <button class="theme-toggle" onclick="changeFontSize(1)" title="Perbesar Teks">🔎 A+</button>
                <button class="theme-toggle" onclick="changeFontSize(-1)" title="Perkecil Teks">🔎 A-</button>
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
            </div>
        </div>

        <div class="options-panel">
            <div class="options-group">
                <div class="options-title">⚡ Cepat & Otomatis</div>
                <select id="presetSelect" class="mini-input wide-input" onchange="applyPreset()">
                    <option value="custom">Kustom (Manual)</option>
                    <option value="cleanall">Bersihkan Semua</option>
                    <option value="keepnum">Pertahankan Angka</option>
                    <option value="stripspaces">Hapus Semua Spasi</option>
                </select>
                <label class="checkbox-group" style="color: var(--success); font-weight: 600; margin-top: 8px;">
                    <input type="checkbox" id="autoCopy"> 📋 Auto-Salin Teks
                </label>
            </div>

            <div class="options-group">
                <div class="options-title">Filter Utama</div>
                <div class="checkbox-grid">
                    <label class="checkbox-group"><input type="checkbox" id="keepSpaces" checked> Pertahankan Spasi</label>
                    <label class="checkbox-group"><input type="checkbox" id="removeNumbers"> Hapus Angka</label>
                    <label class="checkbox-group"><input type="checkbox" id="removeEmptyLines"> Hapus Baris Kosong</label>
                    <label class="checkbox-group"><input type="checkbox" id="collapseSpaces"> Hapus Spasi Ganda</label>
                    <label class="checkbox-group" style="color: var(--primary); font-weight: 500;"><input type="checkbox" id="reverseText"> 🔄 Balikkan Teks</label>
                </div>
            </div>

            <div class="options-group">
                <div class="options-title">Pencarian & Sensor</div>
                <div class="flex-tools">
                    <input type="text" id="findText" placeholder="Cari kata..." class="mini-input">
                    <span style="color: var(--text-muted);">➔</span>
                    <input type="text" id="replaceText" placeholder="Ganti kata..." class="mini-input">
                </div>
                <input type="text" id="profanityText" placeholder="Sensor kata: kasar, rahasia" class="mini-input wide-input" style="margin-top: 8px;">
            </div>

            <div class="options-group">
                <div class="options-title">🔧 Ganti Simbol</div>
                <div class="flex-tools">
                    <input type="text" id="findSymbol" placeholder="Simbol: @ # $" class="mini-input">
                    <span style="color: var(--text-muted);">➔</span>
                    <input type="text" id="replaceSymbol" placeholder="Ganti: * atau kosong" class="mini-input">
                </div>
                <div class="flex-tools" style="margin-top: 8px;">
                    <label style="font-size: 0.85rem; color: var(--text-muted);">Max Karakter:</label>
                    <input type="number" id="charLimit" placeholder="280" class="mini-input number-input" min="1">
                </div>
            </div>

            <div class="options-group">
                <div class="options-title">🔠 Transformasi & Kriptografi</div>
                <div class="radio-group" style="margin-bottom: 8px;">
                    <label><input type="radio" name="textCase" value="normal" checked> Normal</label>
                    <label><input type="radio" name="textCase" value="upper"> UPPER</label>
                    <label><input type="radio" name="textCase" value="lower"> lower</label>
                    <label><input type="radio" name="textCase" value="title"> Title</label>
                </div>
                <div class="flex-tools">
                    <button class="small-btn" onclick="applyBase64(true)">B64 Encode 🔒</button>
                    <button class="small-btn" onclick="applyBase64(false)">B64 Decode 🔓</button>
                    <input type="hidden" id="cryptoMode" value="none">
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="input-group">
                <div class="input-header">
                    <label class="main-label">Teks Asli <span id="autosaveBadge" class="autosave-badge">(Tersimpan ✔)</span></label>
                    <div class="tools-group">
                        <button class="small-btn mic-btn" id="micBtn" onclick="toggleMic()">🎙️ Dikte</button>
                        <label for="fileUpload" class="small-btn">📂 .txt</label>
                        <input type="file" id="fileUpload" accept=".txt" style="display: none;">
                    </div>
                </div>
                <textarea id="inputText" placeholder="Ketik, tempel, atau gunakan suara Anda di sini..."></textarea>
                <div class="counter-bar">
                    <div>
                        <span id="srcChars">0 Karakter</span> | <span id="srcWords">0 Kata</span>
                    </div>
                </div>
            </div>
            
            <div class="input-group">
                <div class="input-header">
                    <label class="main-label">Hasil Bersih</label>
                    <div class="tools-group">
                        <button class="small-btn truncate-btn" id="truncateBtn" onclick="smartTruncate()">✂️ Potong Pintar</button>
                        <button class="small-btn" id="speakBtn" onclick="toggleSpeak()">🔊 Dengarkan</button>
                    </div>
                </div>
                <textarea id="outputText" readonly placeholder="Hasil teks bersih otomatis muncul di sini..."></textarea>
                <div class="counter-bar">
                    <div>
                        <span id="outChars">0 Karakter</span> | <span id="outWords">0 Kata</span>
                    </div>
                    <span id="readTime" class="reading-time">⏱️ 0 dtk waktu baca</span>
                </div>
            </div>
        </div>

        <div class="panels-grid">
            <div class="data-panel">
                <div class="options-title">📊 Kepadatan Kata (Top 5)</div>
                <div id="wordDensityList" class="density-list">
                    <span style="color: var(--text-muted); font-size: 0.85rem;">Belum ada data.</span>
                </div>
            </div>

            <div class="data-panel">
                <div class="options-title">🕰️ Riwayat Teks (5 Terakhir)</div>
                <div id="historyList" class="history-list"></div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-clear" onclick="clearText()">Hapus Semua</button>
            <div class="action-right">
                <button class="btn btn-save" onclick="saveToHistory()">💾 Simpan Riwayat</button>
                <button class="btn btn-copy" onclick="copyText()">Salin Teks</button>
                <button class="btn btn-download" onclick="downloadText()">⬇️ Unduh .txt</button>
                <button class="btn btn-pdf" onclick="downloadPDF()">🖨️ Ekspor PDF</button>
            </div>
        </div>

        <div class="app-footer">
            <div class="author-text">
                Dibuat dengan ❤️ oleh <span class="author-name">Sulfikar</span>
            </div>

                </a>
                <a href="#" class="social-link" title="Telegram" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 000 12a12 12 0 0012 12 12 12 0 0012-12A12 12 0 0012 0a12 12 0 00-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 01.171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
                </a>
                <a href="#" class="social-link" title="Threads" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24"><path d="M14.162 13.921A3.751 3.751 0 0 1 12 14.5a3.75 3.75 0 0 1-3.75-3.75 3.75 3.75 0 0 1 3.75-3.75 3.744 3.744 0 0 1 2.373.843A6.242 6.242 0 0 0 12 6.5a6.25 6.25 0 0 0-6.25 6.25A6.25 6.25 0 0 0 12 19a6.236 6.236 0 0 0 5.485-3.298l1.458.742A7.904 7.904 0 0 1 12 20.75a7.95 7.95 0 0 1-7.95-7.95A7.95 7.95 0 0 1 12 4.85a7.95 7.95 0 0 1 7.95 7.95v1.2a2.25 2.25 0 0 1-4.5 0v-2.02A3.743 3.743 0 0 1 14.162 10.5v3.421ZM12 12.8a2.05 2.05 0 0 0 2.05-2.05A2.05 2.05 0 0 0 12 8.7a2.05 2.05 0 0 0-2.05 2.05A2.05 2.05 0 0 0 12 12.8Z"/></svg>
                </a>
            </div>
        </div>

    </div>

    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const keepSpaces = document.getElementById('keepSpaces');
        const removeNumbers = document.getElementById('removeNumbers');
        const removeEmptyLines = document.getElementById('removeEmptyLines');
        const collapseSpaces = document.getElementById('collapseSpaces');
        const reverseText = document.getElementById('reverseText');
        const caseOptions = document.getElementsByName('textCase');
        const findText = document.getElementById('findText');
        const replaceText = document.getElementById('replaceText');
        const findSymbol = document.getElementById('findSymbol');
        const replaceSymbol = document.getElementById('replaceSymbol');
        const profanityText = document.getElementById('profanityText');
        const charLimitInput = document.getElementById('charLimit');
        const presetSelect = document.getElementById('presetSelect');
        const autoCopy = document.getElementById('autoCopy');
        const truncateBtn = document.getElementById('truncateBtn');
        const readTimeEl = document.getElementById('readTime');
        const wordDensityList = document.getElementById('wordDensityList');
        const historyList = document.getElementById('historyList');
        const autosaveBadge = document.getElementById('autosaveBadge');
        const fileUpload = document.getElementById('fileUpload');
        const cryptoMode = document.getElementById('cryptoMode');
        const body = document.body;
        const themeBtn = document.getElementById('themeBtn');
        const micBtn = document.getElementById('micBtn');
        const speakBtn = document.getElementById('speakBtn');

        let historyArr = JSON.parse(localStorage.getItem('tp_history')) || [];
        let currentFontSize = 16;
        let autoCopyTimer;
        let lastCopiedText = "";

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('tp_theme') === 'dark') toggleTheme();
            if (localStorage.getItem('tp_text')) {
                inputText.value = localStorage.getItem('tp_text');
            }
            purifyText();
            renderHistory();
        });

        const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

        function changeFontSize(direction) {
            currentFontSize += direction * 2;
            if (currentFontSize < 12) currentFontSize = 12;
            if (currentFontSize > 26) currentFontSize = 26;
            inputText.style.fontSize = currentFontSize + 'px';
            outputText.style.fontSize = currentFontSize + 'px';
        }

        function applyPreset() {
            const mode = presetSelect.value;
            if (mode === 'cleanall') {
                keepSpaces.checked = true; removeNumbers.checked = true;
                removeEmptyLines.checked = true; collapseSpaces.checked = true;
            } else if (mode === 'keepnum') {
                keepSpaces.checked = true; removeNumbers.checked = false;
                removeEmptyLines.checked = false; collapseSpaces.checked = true;
            } else if (mode === 'stripspaces') {
                keepSpaces.checked = false; removeNumbers.checked = false;
                removeEmptyLines.checked = true; collapseSpaces.checked = false;
            }
            cryptoMode.value = "none";
            purifyText();
        }

        function updateStats(text, charId, wordId) {
            const charCount = text.length;
            const wordCount = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
            
            const charEl = document.getElementById(charId);
            charEl.innerText = `${charCount} Karakter`;
            document.getElementById(wordId).innerText = `${wordCount} Kata`;

            if (charId === 'outChars') {
                const readingSeconds = Math.ceil(wordCount / 3.3);
                readTimeEl.innerText = readingSeconds > 60 ? `⏱️ ~${Math.ceil(readingSeconds/60)} mnt baca` : `⏱️ ~${readingSeconds} dtk baca`;

                const limit = parseInt(charLimitInput.value);
                if (limit > 0 && charCount > limit) {
                    charEl.classList.add('char-limit-warning');
                    truncateBtn.style.display = 'inline-flex';
                } else {
                    charEl.classList.remove('char-limit-warning');
                    truncateBtn.style.display = 'none';
                }
            }
        }

        function smartTruncate() {
            const limit = parseInt(charLimitInput.value);
            if (!limit || limit <= 0) return;
            let text = outputText.value; 
            if (text.length <= limit) return;

            let truncated = text.substring(0, limit);
            let lastPeriod = truncated.lastIndexOf('.');
            let lastSpace = truncated.lastIndexOf(' ');

            if (lastPeriod > limit * 0.7) truncated = truncated.substring(0, lastPeriod + 1);
            else if (lastSpace > 0) truncated = truncated.substring(0, lastSpace);

            inputText.value = truncated;
            cryptoMode.value = "none";
            purifyText();
            alert("Teks dipotong pintar berdasarkan batas! ✂️");
        }

        function applyBase64(isEncode) {
            let text = inputText.value;
            if (!text) return alert("Tidak ada teks di kolom Teks Asli! ❌");
            
            try {
                if (isEncode) {
                    cryptoMode.value = "encode";
                    alert("Mode Enkripsi Aktif! 🔒");
                } else {
                    cryptoMode.value = "decode";
                    alert("Mode Dekripsi Aktif! 🔓");
                }
                purifyText();
            } catch (e) {
                alert("Gagal memproses Base64! Periksa kembali teks Anda. ❌");
                cryptoMode.value = "none";
            }
        }

        function updateWordDensity(text) {
            wordDensityList.innerHTML = '';
            const words = text.toLowerCase().match(/\b[a-zA-Z0-9À-ÿ']+\b/g);
            if (!words || words.length === 0) {
                wordDensityList.innerHTML = '<span style="color: var(--text-muted); font-size: 0.85rem;">Belum ada data.</span>';
                return;
            }
            const freqMap = {};
            words.forEach(word => { if(word.length > 2 && !word.includes('*')) freqMap[word] = (freqMap[word] || 0) + 1; });
            const topFive = Object.keys(freqMap).map(key => [key, freqMap[key]]).sort((a, b) => b[1] - a[1]).slice(0, 5);

            topFive.forEach(([word, count]) => {
                const badge = document.createElement('span');
                badge.className = 'word-badge';
                badge.innerHTML = `${word} <span class="word-count">${count}x</span>`;
                wordDensityList.appendChild(badge);
            });
        }

        function renderHistory() {
            historyList.innerHTML = '';
            if (historyArr.length === 0) {
                historyList.innerHTML = '<span style="color: var(--text-muted); font-size: 0.85rem;">Belum ada riwayat.</span>';
                return;
            }
            historyArr.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div class="history-text-preview" onclick="restoreHistory(${index})">${item.text}</div>
                    <div class="history-meta">
                        <span style="color: var(--text-muted); font-size: 0.75rem;">${item.date}</span>
                        <button class="history-btn" onclick="deleteHistory(${index})">❌</button>
                    </div>
                `;
                historyList.appendChild(div);
            });
        }

        function saveToHistory() {
            const text = outputText.value.trim();
            if (!text) return alert("Tidak ada teks untuk disimpan! ❌");
            const date = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            historyArr.unshift({ text, date });
            if (historyArr.length > 5) historyArr.pop();
            localStorage.setItem('tp_history', JSON.stringify(historyArr));
            renderHistory();
            alert("Teks disimpan ke riwayat! 💾");
        }

        function restoreHistory(index) {
            inputText.value = historyArr[index].text;
            cryptoMode.value = "none";
            purifyText();
        }

        function deleteHistory(index) {
            historyArr.splice(index, 1);
            localStorage.setItem('tp_history', JSON.stringify(historyArr));
            renderHistory();
        }

        function purifyText() {
            let text = inputText.value;
            localStorage.setItem('tp_text', text);
            autosaveBadge.style.display = text ? 'inline' : 'none';
            autosaveBadge.innerText = "(Tersimpan ✔)";

            if (cryptoMode.value === "encode") {
                try {
                    text = btoa(unescape(encodeURIComponent(text)));
                } catch(e) { cryptoMode.value = "none"; }
            } else if (cryptoMode.value === "decode") {
                try {
                    text = decodeURIComponent(escape(atob(text)));
                } catch(e) { cryptoMode.value = "none"; }
            }

            if (cryptoMode.value === "none") {
                const findStr = findText.value;
                if (findStr) {
                    text = text.replace(new RegExp(escapeRegExp(findStr), 'g'), replaceText.value);
                }

                const findSymStr = findSymbol.value;
                if (findSymStr) {
                    const cleanSym = escapeRegExp(findSymStr);
                    text = text.replace(new RegExp('[' + cleanSym + ']', 'g'), replaceSymbol.value);
                }

                if (removeEmptyLines.checked) text = text.replace(/^\s*[\r\n]/gm, '');

                let regexStr = '[^a-zA-Z';
                if (!removeNumbers.checked) regexStr += '0-9';
                if (keepSpaces.checked) regexStr += '\\s';
                regexStr += ']';
                text = text.replace(new RegExp(regexStr, 'g'), '');

                if (collapseSpaces.checked) text = text.replace(/[ \t]+/g, ' ');

                const profanityStr = profanityText.value;
                if (profanityStr) {
                    profanityStr.split(',').map(w => w.trim()).filter(w => w.length > 0).forEach(word => {
                        text = text.replace(new RegExp(`\\b${escapeRegExp(word)}\\b`, 'gi'), '*'.repeat(word.length));
                    });
                }
            }

            if (reverseText.checked) text = text.split('').reverse().join('');

            let selectedCase = 'normal';
            for (const radio of caseOptions) { if (radio.checked) { selectedCase = radio.value; break; } }
            if (selectedCase === 'upper') text = text.toUpperCase();
            else if (selectedCase === 'lower') text = text.toLowerCase();
            else if (selectedCase === 'title') text = text.toLowerCase().replace(/\b\w/g, char => char.toUpperCase());

            outputText.value = text;

            updateStats(inputText.value, 'srcChars', 'srcWords');
            updateStats(text, 'outChars', 'outWords');
            updateWordDensity(text);

            if (autoCopy.checked && text.trim() !== '') {
                clearTimeout(autoCopyTimer);
                autoCopyTimer = setTimeout(() => {
                    if (lastCopiedText !== text) {
                        navigator.clipboard.writeText(text).then(() => {
                            lastCopiedText = text;
                            autosaveBadge.innerText = "(Tersalin Otomatis 📋✔)";
                        }).catch(() => {});
                    }
                }, 1500); 
            }
        }

        const allInputs = [inputText, findText, replaceText, findSymbol, replaceSymbol, profanityText, charLimitInput, keepSpaces, removeNumbers, removeEmptyLines, collapseSpaces, reverseText];
        allInputs.forEach(el => el.addEventListener('input', () => {
            if (el === inputText) cryptoMode.value = "none";
            if (el !== presetSelect) presetSelect.value = 'custom';
            purifyText();
        }));
        caseOptions.forEach(radio => radio.addEventListener('change', () => { purifyText(); }));

        let isListening = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition(); recognition.continuous = true; recognition.lang = 'id-ID';
            recognition.onstart = () => { isListening = true; micBtn.innerHTML = '🔴 Rekam'; };
            recognition.onresult = (e) => {
                let currentText = inputText.value;
                const transcript = e.results[e.results.length - 1][0].transcript;
                inputText.value = currentText + (currentText.endsWith(' ') || currentText === '' ? '' : ' ') + transcript;
                cryptoMode.value = "none"; purifyText();
            };
            recognition.onend = () => { if(isListening) recognition.start(); else micBtn.innerHTML = '🎙️ Dikte'; };
        } else { micBtn.style.display = 'none'; }

        function toggleMic() {
            if(!SpeechRecognition) return alert("Browser tidak support dikte!");
            if(isListening) { isListening = false; recognition.stop(); } else { recognition.start(); }
        }

        let synth = window.speechSynthesis;
        function toggleSpeak() {
            if (!synth) return alert("Browser tidak support Text-to-Speech!");
            if (synth.speaking) { synth.cancel(); speakBtn.innerHTML = '🔊 Dengarkan'; return; }
            if (!outputText.value) return;
            const utterance = new SpeechSynthesisUtterance(outputText.value); utterance.lang = 'id-ID';
            utterance.onend = () => { speakBtn.innerHTML = '🔊 Dengarkan'; };
            speakBtn.innerHTML = '🛑 Berhenti'; synth.speak(utterance);
        }

        fileUpload.addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) { inputText.value = e.target.result; cryptoMode.value = "none"; purifyText(); };
            reader.readAsText(file);
        });

        function downloadText() {
            if (!outputText.value) return;
            const blob = new Blob([outputText.value], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Teks_Clean_v3.txt'; a.click();
        }

        function downloadPDF() {
            if (!outputText.value) return;
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const lines = doc.splitTextToSize(outputText.value, 180);
            let cursorY = 20;
            for (let i = 0; i < lines.length; i++) {
                if (cursorY > 280) { doc.addPage(); cursorY = 20; }
                doc.text(lines[i], 15, cursorY); cursorY += 7;
            }
            doc.save("Dokumen_Clean.pdf");
        }

        function clearText() {
            inputText.value = ''; outputText.value = ''; findText.value = ''; replaceText.value = '';
            findSymbol.value = ''; replaceSymbol.value = ''; profanityText.value = ''; charLimitInput.value = '';
            cryptoMode.value = "none"; presetSelect.value = 'custom';
            if (isListening) toggleMic(); if (synth && synth.speaking) synth.cancel();
            purifyText();
        }

        function copyText() {
            if (!outputText.value) return;
            navigator.clipboard.writeText(outputText.value).then(() => alert("Teks Berhasil Disalin! ✅"));
        }

        function toggleTheme() {
            const isLight = body.getAttribute('data-theme') === 'light';
            body.setAttribute('data-theme', isLight ? 'dark' : 'light');
            themeBtn.innerHTML = isLight ? '☀️ Light' : '🌙 Dark';
            localStorage.setItem('tp_theme', isLight ? 'dark' : 'light');
        }
    </script>
</body>
</html>
