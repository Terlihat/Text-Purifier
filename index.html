<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Purifier | Lebih Keren dari Pembersih Biasa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #34495e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #e0e6ed;
            border-radius: 12px;
            resize: none;
            font-size: 1rem;
            color: #2c3e50;
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #3498db;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
        }

        .options {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            color: #555;
            cursor: pointer;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-clear {
            background-color: #ffeaea;
            color: #e74c3c;
        }

        .btn-clear:hover {
            background-color: #ffcece;
        }

        .btn-copy {
            background-color: #3498db;
            color: white;
        }

        .btn-copy:hover {
            background-color: #2980b9;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        /* Notifikasi Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ecc71;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            transform: translateY(20px);
        }

        #toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Text Purifier ✨</h1>
        <p class="subtitle">Hapus simbol dan karakter tidak penting secara real-time.</p>

        <div class="options">
            <label class="checkbox-group">
                <input type="checkbox" id="keepSpaces" checked> Pertahankan Spasi
            </label>
            <label class="checkbox-group">
                <input type="checkbox" id="removeNumbers"> Hapus Angka
            </label>
        </div>

        <div class="grid">
            <div class="input-group">
                <label for="inputText">Teks Asli</label>
                <textarea id="inputText" placeholder="Ketik atau paste teks Anda yang penuh simbol di sini..."></textarea>
            </div>
            <div class="input-group">
                <label for="outputText">Hasil Bersih</label>
                <textarea id="outputText" readonly placeholder="Teks bersih akan muncul di sini secara otomatis..."></textarea>
            </div>
        </div>

        <div class="actions">
            <button class="btn-clear" onclick="clearText()">Hapus Semua</button>
            <button class="btn-copy" onclick="copyText()">Salin Hasil</button>
        </div>
    </div>

    <div id="toast">Teks berhasil disalin! ✅</div>

    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const keepSpaces = document.getElementById('keepSpaces');
        const removeNumbers = document.getElementById('removeNumbers');
        const toast = document.getElementById('toast');

        // Fungsi utama untuk membersihkan teks
        function purifyText() {
            let text = inputText.value;

            // Regex: Menghapus semua yang bukan huruf (a-z, A-Z), angka (0-9), dan bukan spasi.
            let regexStr = '[^a-zA-Z';
            
            if (!removeNumbers.checked) {
                regexStr += '0-9'; // Pertahankan angka jika tidak dicentang
            }
            if (keepSpaces.checked) {
                regexStr += '\\s'; // Pertahankan spasi jika dicentang
            }
            
            regexStr += ']';
            const regex = new RegExp(regexStr, 'g');

            outputText.value = text.replace(regex, '');
        }

        // Event listener: memproses setiap kali pengguna mengetik atau mengubah opsi
        inputText.addEventListener('input', purifyText);
        keepSpaces.addEventListener('change', purifyText);
        removeNumbers.addEventListener('change', purifyText);

        // Fungsi menghapus teks
        function clearText() {
            inputText.value = '';
            outputText.value = '';
            inputText.focus();
        }

        // Fungsi menyalin teks ke clipboard
        function copyText() {
            if (outputText.value === '') return;
            
            navigator.clipboard.writeText(outputText.value).then(() => {
                showToast();
            });
        }

        // Fungsi menampilkan notifikasi
        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
