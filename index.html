<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Purifier</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #e0e6ed;
            --bg-input: #f8fafc;
            --primary: #3498db;
            --primary-hover: #2980b9;
            --success: #10b981;
            --success-hover: #059669;
            --warning: #f59e0b;
            --warning-hover: #d97706;
            --premium: #eab308;
            --premium-bg: #fef9c3;
            --pdf-color: #8b5cf6;
            --pdf-hover: #7c3aed;
            --accent-red: #e74c3c;
            --accent-red-bg: #ffeaea;
            --accent-red-hover: #ffcece;
            --shadow: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --bg-input: #0f172a;
            --primary: #38bdf8;
            --primary-hover: #7dd3fc;
            --success: #34d399;
            --success-hover: #10b981;
            --warning: #fbbf24;
            --warning-hover: #f59e0b;
            --premium: #fde047;
            --premium-bg: #422006;
            --pdf-color: #a78bfa;
            --pdf-hover: #8b5cf6;
            --accent-red: #f87171;
            --accent-red-bg: #451a1a;
            --accent-red-hover: #652222;
            --shadow: rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--bg-card);
            width: 100%;
            max-width: 1200px;
            border-radius: 16px;
            box-shadow: 0 10px 30px var(--shadow);
            padding: 30px;
            position: relative;
        }

        /* Header */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .version-badge {
            font-size: 0.75rem;
            background: linear-gradient(135deg, #eab308, #d97706);
            color: #ffffff;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(234, 179, 8, 0.4);
            letter-spacing: 0.5px;
        }

        .header-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .theme-toggle {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Opsi Konfigurasi */
        .options-panel {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: flex-start;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .options-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 20px;
        }

        .checkbox-group, .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* Custom Inputs */
        .flex-tools {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mini-input {
            width: 110px;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 0.85rem;
        }

        .mini-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .wide-input { width: 180px; }
        .number-input { width: 80px; }
        select.mini-input { cursor: pointer; height: 35px; }

        /* Premium Section */
        .premium-group {
            border-left: 3px solid var(--premium);
            padding-left: 15px;
            background: var(--premium-bg);
            border-radius: 0 8px 8px 0;
            padding-right: 15px;
            padding-top: 5px;
            padding-bottom: 5px;
        }

        /* Text Area Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            min-height: 38px; 
        }

        label.main-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .tools-group {
            display: flex;
            gap: 8px;
        }

        .small-btn {
            font-size: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .small-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .premium-btn:hover {
            border-color: var(--premium);
            color: var(--premium);
        }

        .truncate-btn {
            background-color: var(--accent-red-bg);
            color: var(--accent-red);
            border-color: var(--accent-red);
            display: none;
            animation: fadeIn 0.3s;
        }
        
        .truncate-btn:hover { background-color: var(--accent-red); color: white; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .mic-btn.listening {
            background-color: var(--accent-red-bg);
            color: var(--accent-red);
            border-color: var(--accent-red);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        textarea {
            width: 100%;
            height: 280px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            resize: none;
            font-size: 16px; 
            color: var(--text-main);
            background-color: var(--bg-input);
            line-height: 1.6;
        }

        textarea:focus { outline: none; border-color: var(--primary); }

        .counter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
            padding: 0 4px;
        }

        .reading-time {
            color: var(--premium);
            font-weight: 600;
            background: var(--premium-bg);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .autosave-badge {
            color: var(--success);
            font-size: 0.75rem;
            font-weight: 500;
            display: none;
        }
        
        .char-limit-warning { color: var(--accent-red) !important; font-weight: bold; }

        /* Panels Grid */
        .panels-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }
        
        @media (max-width: 800px) { .panels-grid { grid-template-columns: 1fr; } }

        .data-panel {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
        }

        .density-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .word-badge {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .word-count {
            background: var(--primary);
            color: #0f172a;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* History Log */
        .history-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .history-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 10px 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }
        .history-item:hover { border-color: var(--primary); }
        .history-text-preview { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%; cursor: pointer; }
        .history-text-preview:hover { color: var(--primary); }
        .history-meta { display: flex; align-items: center; gap: 10px; }
        .history-btn { background: none; border: none; cursor: pointer; font-size: 0.9rem; opacity: 0.7; }
        .history-btn:hover { opacity: 1; }

        /* Aksi Utama */
        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .action-right { display: flex; flex-wrap: wrap; gap: 10px; }

        button.btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-clear { background-color: var(--accent-red-bg); color: var(--accent-red); }
        .btn-clear:hover { background-color: var(--accent-red-hover); }
        .btn-copy { background-color: var(--primary); color: #0f172a; }
        .btn-copy:hover { background-color: var(--primary-hover); }
        .btn-download { background-color: var(--success); color: white; }
        .btn-download:hover { background-color: var(--success-hover); }
        .btn-pdf { background-color: var(--pdf-color); color: white; }
        .btn-pdf:hover { background-color: var(--pdf-hover); }
        .btn-save { background-color: var(--warning); color: #0f172a; }
        .btn-save:hover { background-color: var(--warning-hover); }

        /* Notifikasi Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            z-index: 999;
        }
        #toast.show { opacity: 1; visibility: visible; transform: translateY(0); }
    </style>
</head>
<body data-theme="light">

    <div class="container">
        <div class="header-area">
            <h1>Text Purifier <span class="version-badge">v3.0 ULTIMATE</span></h1>
            <div class="header-controls">
                <button class="theme-toggle" onclick="changeFontSize(1)" title="Perbesar Teks">🔎 A+</button>
                <button class="theme-toggle" onclick="changeFontSize(-1)" title="Perkecil Teks">🔎 A-</button>
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
            </div>
        </div>

        <div class="options-panel">
            <div class="options-group">
                <div class="options-title">⚡ Cepat & Otomatis</div>
                <select id="presetSelect" class="mini-input wide-input" onchange="applyPreset()">
                    <option value="custom">Kustom (Manual)</option>
                    <option value="cleanall">Bersihkan Semua</option>
                    <option value="keepnum">Pertahankan Angka</option>
                    <option value="stripspaces">Hapus Semua Spasi</option>
                </select>
                <label class="checkbox-group" style="color: var(--success); font-weight: 600; margin-top: 8px;">
                    <input type="checkbox" id="autoCopy"> 📋 Auto-Salin Teks
                </label>
            </div>

            <div class="options-group">
                <div class="options-title">Filter Utama</div>
                <div class="checkbox-grid">
                    <label class="checkbox-group"><input type="checkbox" id="keepSpaces" checked> Pertahankan Spasi</label>
                    <label class="checkbox-group"><input type="checkbox" id="removeNumbers"> Hapus Angka</label>
                    <label class="checkbox-group"><input type="checkbox" id="removeEmptyLines"> Hapus Baris Kosong</label>
                    <label class="checkbox-group"><input type="checkbox" id="collapseSpaces"> Hapus Spasi Ganda</label>
                    <label class="checkbox-group" style="color: var(--primary); font-weight: 500;"><input type="checkbox" id="reverseText"> 🔄 Balikkan Teks</label>
                </div>
            </div>

            <div class="options-group">
                <div class="options-title">Pencarian & Sensor</div>
                <div class="flex-tools">
                    <input type="text" id="findText" placeholder="Cari..." class="mini-input">
                    <span style="color: var(--text-muted);">➔</span>
                    <input type="text" id="replaceText" placeholder="Ganti..." class="mini-input">
                </div>
                <input type="text" id="profanityText" placeholder="Sensor kata: kasar, rahasia" class="mini-input wide-input" style="margin-top: 8px;">
            </div>

            <div class="options-group">
                <div class="options-title">Batas & Pengecualian</div>
                <div class="flex-tools">
                    <input type="text" id="exceptionsText" placeholder="Kecualikan Simbol: , . @" class="mini-input wide-input">
                </div>
                <div class="flex-tools" style="margin-top: 8px;">
                    <label style="font-size: 0.85rem; color: var(--text-muted);">Max Karakter:</label>
                    <input type="number" id="charLimit" placeholder="280" class="mini-input number-input" min="1">
                </div>
            </div>

            <div class="options-group premium-group">
                <div class="options-title" style="color: var(--premium);">👑 Premium Tools</div>
                <div class="radio-group" style="margin-bottom: 8px;">
                    <label><input type="radio" name="textCase" value="normal" checked> Normal</label>
                    <label><input type="radio" name="textCase" value="upper"> UPPER</label>
                    <label><input type="radio" name="textCase" value="lower"> lower</label>
                    <label><input type="radio" name="textCase" value="title"> Title</label>
                </div>
                <div class="flex-tools">
                    <button class="small-btn premium-btn" onclick="applyBase64(true)">B64 Encode 🔒</button>
                    <button class="small-btn premium-btn" onclick="applyBase64(false)">B64 Decode 🔓</button>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="input-group">
                <div class="input-header">
                    <label class="main-label">Teks Asli <span id="autosaveBadge" class="autosave-badge">(Tersimpan ✔)</span></label>
                    <div class="tools-group">
                        <button class="small-btn mic-btn" id="micBtn" onclick="toggleMic()">🎙️ Dikte</button>
                        <label for="fileUpload" class="small-btn">📂 .txt</label>
                        <input type="file" id="fileUpload" accept=".txt" style="display: none;">
                    </div>
                </div>
                <textarea id="inputText" placeholder="Ketik, tempel, atau gunakan suara Anda di sini..."></textarea>
                <div class="counter-bar">
                    <div>
                        <span id="srcChars">0 Karakter</span> | <span id="srcWords">0 Kata</span>
                    </div>
                </div>
            </div>
            
            <div class="input-group">
                <div class="input-header">
                    <label class="main-label">Hasil Bersih</label>
                    <div class="tools-group">
                        <button class="small-btn truncate-btn" id="truncateBtn" onclick="smartTruncate()">✂️ Potong Pintar</button>
                        <button class="small-btn" id="speakBtn" onclick="toggleSpeak()">🔊 Dengarkan</button>
                    </div>
                </div>
                <textarea id="outputText" readonly placeholder="Hasil teks bersih otomatis muncul di sini..."></textarea>
                <div class="counter-bar">
                    <div>
                        <span id="outChars">0 Karakter</span> | <span id="outWords">0 Kata</span>
                    </div>
                    <span id="readTime" class="reading-time">⏱️ 0 dtk waktu baca</span>
                </div>
            </div>
        </div>

        <div class="panels-grid">
            <div class="data-panel">
                <div class="options-title">📊 Kepadatan Kata (Top 5)</div>
                <div id="wordDensityList" class="density-list">
                    <span style="color: var(--text-muted); font-size: 0.85rem;">Belum ada data.</span>
                </div>
            </div>

            <div class="data-panel">
                <div class="options-title">🕰️ Riwayat Teks (5 Terakhir)</div>
                <div id="historyList" class="history-list">
                    </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-clear" onclick="clearText()">Hapus Semua</button>
            <div class="action-right">
                <button class="btn btn-save" onclick="saveToHistory()">💾 Simpan Riwayat</button>
                <button class="btn btn-copy" onclick="copyText()">Salin Teks</button>
                <button class="btn btn-download" onclick="downloadText()">⬇️ Unduh .txt</button>
                <button class="btn btn-pdf" onclick="downloadPDF()">🖨️ Ekspor PDF</button>
            </div>
        </div>
    </div>

    <div id="toast">Teks berhasil disalin! ✅</div>

    <script>
        // Deklarasi Elemen Utama
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const keepSpaces = document.getElementById('keepSpaces');
        const removeNumbers = document.getElementById('removeNumbers');
        const removeEmptyLines = document.getElementById('removeEmptyLines');
        const collapseSpaces = document.getElementById('collapseSpaces');
        const reverseText = document.getElementById('reverseText');
        const caseOptions = document.getElementsByName('textCase');
        const exceptionsText = document.getElementById('exceptionsText');
        const findText = document.getElementById('findText');
        const replaceText = document.getElementById('replaceText');
        const profanityText = document.getElementById('profanityText');
        const charLimitInput = document.getElementById('charLimit');
        const presetSelect = document.getElementById('presetSelect');
        const autoCopy = document.getElementById('autoCopy');
        const truncateBtn = document.getElementById('truncateBtn');
        const readTimeEl = document.getElementById('readTime');
        const wordDensityList = document.getElementById('wordDensityList');
        const historyList = document.getElementById('historyList');
        const toast = document.getElementById('toast');
        const autosaveBadge = document.getElementById('autosaveBadge');
        const fileUpload = document.getElementById('fileUpload');
        const body = document.body;
        const themeBtn = document.getElementById('themeBtn');
        const micBtn = document.getElementById('micBtn');
        const speakBtn = document.getElementById('speakBtn');

        let historyArr = JSON.parse(localStorage.getItem('tp_history')) || [];
        let currentFontSize = 16;
        let autoCopyTimer;
        let lastCopiedText = "";

        // Inisialisasi
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('tp_theme') === 'dark') toggleTheme();
            if (localStorage.getItem('tp_text')) {
                inputText.value = localStorage.getItem('tp_text');
                purifyText();
            }
            renderHistory();
        });

        const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

        // Font Size Adjuster
        function changeFontSize(direction) {
            currentFontSize += direction * 2;
            if (currentFontSize < 12) currentFontSize = 12;
            if (currentFontSize > 26) currentFontSize = 26;
            inputText.style.fontSize = currentFontSize + 'px';
            outputText.style.fontSize = currentFontSize + 'px';
        }

        // Preset Cepat
        function applyPreset() {
            const mode = presetSelect.value;
            if (mode === 'cleanall') {
                keepSpaces.checked = true; removeNumbers.checked = true;
                removeEmptyLines.checked = true; collapseSpaces.checked = true;
            } else if (mode === 'keepnum') {
                keepSpaces.checked = true; removeNumbers.checked = false;
                removeEmptyLines.checked = false; collapseSpaces.checked = true;
            } else if (mode === 'stripspaces') {
                keepSpaces.checked = false; removeNumbers.checked = false;
                removeEmptyLines.checked = true; collapseSpaces.checked = false;
            }
            purifyText();
        }

        // Update Statistik & Waktu Baca
        function updateStats(text, charId, wordId) {
            const charCount = text.length;
            const wordCount = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
            
            const charEl = document.getElementById(charId);
            charEl.innerText = `${charCount} Karakter`;
            document.getElementById(wordId).innerText = `${wordCount} Kata`;

            if (charId === 'outChars') {
                // Kalkulasi Waktu Baca (Rata-rata 200 kata per menit -> ~3.3 kata per detik)
                const readingSeconds = Math.ceil(wordCount / 3.3);
                if (readingSeconds > 60) {
                    readTimeEl.innerText = `⏱️ ~${Math.ceil(readingSeconds/60)} mnt waktu baca`;
                } else {
                    readTimeEl.innerText = `⏱️ ~${readingSeconds} dtk waktu baca`;
                }

                // Logika Batas Karakter
                const limit = parseInt(charLimitInput.value);
                if (limit > 0 && charCount > limit) {
                    charEl.classList.add('char-limit-warning');
                    truncateBtn.style.display = 'inline-flex';
                } else {
                    charEl.classList.remove('char-limit-warning');
                    truncateBtn.style.display = 'none';
                }
            }
        }

        // Smart Truncate (Potong Pintar) - Diperbaiki
        function smartTruncate() {
            const limit = parseInt(charLimitInput.value);
            if (!limit || limit <= 0) return;
            
            let text = outputText.value; 
            if (text.length <= limit) return;

            let truncated = text.substring(0, limit);
            let lastPeriod = truncated.lastIndexOf('.');
            let lastSpace = truncated.lastIndexOf(' ');

            if (lastPeriod > limit * 0.7) { 
                truncated = truncated.substring(0, lastPeriod + 1);
            } else if (lastSpace > 0) { 
                truncated = truncated.substring(0, lastSpace);
            }

            // Ganti input asli agar output sinkron, atau hanya hasil akhirnya (disini kita set input)
            inputText.value = truncated;
            purifyText();
            showToast("Teks dipotong pintar berdasarkan batas! ✂️");
        }

        // Fitur Premium: Base64 Encode/Decode
        function applyBase64(isEncode) {
            try {
                let text = inputText.value;
                if (!text) return showToast("Tidak ada teks! ❌");
                
                if (isEncode) {
                    inputText.value = btoa(unescape(encodeURIComponent(text)));
                    showToast("Teks dienkripsi (Base64)! 🔒");
                } else {
                    inputText.value = decodeURIComponent(escape(atob(text)));
                    showToast("Teks didekripsi! 🔓");
                }
                purifyText();
            } catch (e) {
                showToast("Teks bukan format Base64 valid! ❌");
            }
        }

        // Kepadatan Kata
        function updateWordDensity(text) {
            wordDensityList.innerHTML = '';
            const words = text.toLowerCase().match(/\b[a-zA-Z0-9À-ÿ']+\b/g);
            
            if (!words || words.length === 0) {
                wordDensityList.innerHTML = '<span style="color: var(--text-muted); font-size: 0.85rem;">Belum ada data.</span>';
                return;
            }

            const freqMap = {};
            words.forEach(word => {
                if(word.length > 2 && !word.includes('*')) { // Hanya kata > 2 huruf
                    freqMap[word] = (freqMap[word] || 0) + 1;
                }
            });

            const sortedWords = Object.keys(freqMap).map(key => [key, freqMap[key]]).sort((a, b) => b[1] - a[1]);
            const topFive = sortedWords.slice(0, 5);

            topFive.forEach(([word, count]) => {
                const badge = document.createElement('span');
                badge.className = 'word-badge';
                badge.innerHTML = `${word} <span class="word-count">${count}x</span>`;
                wordDensityList.appendChild(badge);
            });
        }

        // --- SISTEM RIWAYAT ---
        function renderHistory() {
            historyList.innerHTML = '';
            if (historyArr.length === 0) {
                historyList.innerHTML = '<span style="color: var(--text-muted); font-size: 0.85rem;">Belum ada riwayat tersimpan.</span>';
                return;
            }
            historyArr.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div class="history-text-preview" onclick="restoreHistory(${index})" title="Klik memulihkan">${item.text}</div>
                    <div class="history-meta">
                        <span style="color: var(--text-muted); font-size: 0.75rem;">${item.date}</span>
                        <button class="history-btn" onclick="deleteHistory(${index})" title="Hapus">❌</button>
                    </div>
                `;
                historyList.appendChild(div);
            });
        }

        function saveToHistory() {
            const text = outputText.value.trim();
            if (!text) return showToast("Tidak ada teks untuk disimpan ❌");
            const date = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            historyArr.unshift({ text, date });
            if (historyArr.length > 5) historyArr.pop();
            localStorage.setItem('tp_history', JSON.stringify(historyArr));
            renderHistory();
            showToast("Teks disimpan ke riwayat! 💾");
        }

        function restoreHistory(index) {
            inputText.value = historyArr[index].text;
            purifyText();
            showToast("Teks dipulihkan 🔄");
        }

        function deleteHistory(index) {
            historyArr.splice(index, 1);
            localStorage.setItem('tp_history', JSON.stringify(historyArr));
            renderHistory();
        }

        // --- FUNGSI INTI PEMBERSIH TEKS ---
        function purifyText() {
            let text = inputText.value;

            localStorage.setItem('tp_text', text);
            autosaveBadge.style.display = text ? 'inline' : 'none';
            autosaveBadge.innerText = "(Tersimpan ✔)";

            // 1. Cari & Ganti (Bug Fix)
            const findStr = findText.value;
            const repStr = replaceText.value;
            if (findStr) {
                const findRegex = new RegExp(escapeRegExp(findStr), 'g');
                text = text.replace(findRegex, repStr);
            }

            // 2. Hapus Baris Kosong
            if (removeEmptyLines.checked) text = text.replace(/^\s*[\r\n]/gm, '');

            // 3. Regex Filter Utama
            let regexStr = '[^a-zA-Z';
            if (!removeNumbers.checked) regexStr += '0-9';
            if (keepSpaces.checked) regexStr += '\\s';
            
            const exceptions = exceptionsText.value; 
            if (exceptions) regexStr += escapeRegExp(exceptions);
            regexStr += ']';
            
            const regex = new RegExp(regexStr, 'g');
            let cleanedText = text.replace(regex, '');

            // 4. Hapus Spasi Ganda
            if (collapseSpaces.checked) cleanedText = cleanedText.replace(/[ \t]+/g, ' ');

            // 5. Sensor Kata (Bug Fix)
            const profanityStr = profanityText.value;
            if (profanityStr) {
                const badWords = profanityStr.split(',').map(w => w.trim()).filter(w => w.length > 0);
                badWords.forEach(word => {
                    try {
                        const badRegex = new RegExp(`\\b${escapeRegExp(word)}\\b`, 'gi');
                        cleanedText = cleanedText.replace(badRegex, '*'.repeat(word.length));
                    } catch(e) {}
                });
            }

            // 6. Pembalik Teks
            if (reverseText.checked) cleanedText = cleanedText.split('').reverse().join('');

            // 7. Kapitalisasi Teks
            let selectedCase = 'normal';
            for (const radio of caseOptions) {
                if (radio.checked) { selectedCase = radio.value; break; }
            }
            if (selectedCase === 'upper') cleanedText = cleanedText.toUpperCase();
            else if (selectedCase === 'lower') cleanedText = cleanedText.toLowerCase();
            else if (selectedCase === 'title') {
                cleanedText = cleanedText.toLowerCase().replace(/\b\w/g, char => char.toUpperCase());
            }

            outputText.value = cleanedText;

            // Update UI & Stats
            updateStats(text, 'srcChars', 'srcWords');
            updateStats(cleanedText, 'outChars', 'outWords');
            updateWordDensity(cleanedText);

            // Fitur Auto-Salin (Bug Fix: Jeda diperpanjang, cek teks sama)
            if (autoCopy.checked && cleanedText.trim() !== '') {
                clearTimeout(autoCopyTimer);
                autoCopyTimer = setTimeout(() => {
                    if (lastCopiedText !== cleanedText) {
                        navigator.clipboard.writeText(cleanedText).then(() => {
                            lastCopiedText = cleanedText;
                            autosaveBadge.innerText = "(Tersalin Otomatis 📋✔)";
                        }).catch(err => console.log('Auto-copy diblokir browser', err));
                    }
                }, 1500); 
            }
        }

        // Event Listeners Input
        const allInputs = [inputText, exceptionsText, findText, replaceText, profanityText, charLimitInput, keepSpaces, removeNumbers, removeEmptyLines, collapseSpaces, reverseText];
        allInputs.forEach(el => el.addEventListener('input', () => {
            if (el !== presetSelect) presetSelect.value = 'custom';
            purifyText();
        }));
        caseOptions.forEach(radio => radio.addEventListener('change', () => {
            presetSelect.value = 'custom';
            purifyText();
        }));

        // Speech to Text (Dikte)
        let isListening = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'id-ID';

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                micBtn.innerHTML = '🔴 Rekam';
                showToast("Mikrofon aktif 🎙️");
            };

            recognition.onresult = (event) => {
                let currentText = inputText.value;
                const transcript = event.results[event.results.length - 1][0].transcript;
                inputText.value = currentText + (currentText.endsWith(' ') || currentText === '' ? '' : ' ') + transcript;
                purifyText();
            };

            recognition.onerror = () => { showToast("Kesalahan mikrofon ❌"); if (isListening) toggleMic(); };
            recognition.onend = () => {
                if(isListening) recognition.start();
                else { micBtn.classList.remove('listening'); micBtn.innerHTML = '🎙️ Dikte'; }
            };
        } else { micBtn.style.display = 'none'; }

        function toggleMic() {
            if(!SpeechRecognition) return showToast("Browser tidak mendukung Dikte ❌");
            if(isListening) {
                isListening = false; recognition.stop();
                micBtn.classList.remove('listening'); micBtn.innerHTML = '🎙️ Dikte';
                showToast("Mikrofon dimatikan 🛑");
            } else { recognition.start(); }
        }

        // Text-to-Speech (Dengarkan)
        let synth = window.speechSynthesis;
        function toggleSpeak() {
            if (!synth) return showToast("Browser tidak mendukung Fitur Suara ❌");
            if (synth.speaking) {
                synth.cancel(); speakBtn.innerHTML = '🔊 Dengarkan';
                showToast("Suara dihentikan 🛑"); return;
            }
            const text = outputText.value;
            if (!text) return showToast("Tidak ada teks ❌");
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'id-ID';
            utterance.onend = () => { speakBtn.innerHTML = '🔊 Dengarkan'; };
            utterance.onerror = () => { speakBtn.innerHTML = '🔊 Dengarkan'; };
            speakBtn.innerHTML = '🛑 Berhenti';
            synth.speak(utterance);
            showToast("Membacakan hasil... 🔊");
        }

        // Upload File .txt
        fileUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                inputText.value = e.target.result; purifyText();
                showToast("File dimuat! 📂");
            };
            reader.readAsText(file);
        });

        // Ekspor File (TXT & PDF)
        function downloadText() {
            const text = outputText.value;
            if (!text) return showToast("Tidak ada teks ❌");
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = 'Teks_Bersih_Ultimate.txt';
            a.click(); showToast("File TXT diunduh! ⬇️");
        }

        function downloadPDF() {
            if (typeof window.jspdf === 'undefined') return showToast("Pustaka PDF sedang dimuat ⏳");
            const text = outputText.value;
            if (!text) return showToast("Tidak ada teks ❌");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("helvetica", "normal"); doc.setFontSize(12);
            const lines = doc.splitTextToSize(text, 180);
            let cursorY = 20;
            for (let i = 0; i < lines.length; i++) {
                if (cursorY > 280) { doc.addPage(); cursorY = 20; }
                doc.text(lines[i], 15, cursorY); cursorY += 7;
            }
            doc.save("Dokumen_Teks_Ultimate.pdf");
            showToast("File PDF dibuat! 🖨️");
        }

        // Fungsi Lainnya (Clear, Copy, Toast, Theme)
        function clearText() {
            inputText.value = ''; outputText.value = ''; exceptionsText.value = '';
            findText.value = ''; replaceText.value = ''; profanityText.value = '';
            charLimitInput.value = ''; fileUpload.value = ''; presetSelect.value = 'custom';
            if (isListening) toggleMic();
            if (synth && synth.speaking) synth.cancel();
            localStorage.removeItem('tp_text'); autosaveBadge.style.display = 'none';
            purifyText(); inputText.focus(); showToast("Teks dihapus 🗑️");
        }

        function copyText() {
            if (outputText.value === '') return;
            navigator.clipboard.writeText(outputText.value).then(() => {
                showToast("Teks disalin! ✅");
            });
        }

        function showToast(message) {
            toast.innerText = message; toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        function toggleTheme() {
            const isLight = body.getAttribute('data-theme') === 'light';
            body.setAttribute('data-theme', isLight ? 'dark' : 'light');
            themeBtn.innerHTML = isLight ? '☀️ Light Mode' : '🌙 Dark Mode';
            localStorage.setItem('tp_theme', isLight ? 'dark' : 'light');
        }
    </script>
</body>
</html>
