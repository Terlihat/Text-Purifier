<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Purifier Pro | v1.1.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #e0e6ed;
            --bg-input: #f8fafc;
            --primary: #3498db;
            --primary-hover: #2980b9;
            --accent-red: #e74c3c;
            --accent-red-bg: #ffeaea;
            --accent-red-hover: #ffcece;
            --shadow: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --bg-input: #0f172a;
            --primary: #38bdf8;
            --primary-hover: #7dd3fc;
            --accent-red: #f87171;
            --accent-red-bg: #451a1a;
            --accent-red-hover: #652222;
            --shadow: rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--bg-card);
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            box-shadow: 0 10px 30px var(--shadow);
            padding: 30px;
            position: relative;
        }

        /* Header & Theme Toggle */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .version-badge {
            font-size: 0.75rem;
            background: var(--primary);
            color: #0f172a;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
            vertical-align: middle;
            margin-left: 8px;
        }

        .theme-toggle {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Opsi Konfigurasi */
        .options-panel {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 25px;
        }

        .options-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            color: var(--text-muted);
        }

        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .checkbox-group input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .radio-group {
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 2px solid var(--border-color);
            padding-left: 20px;
        }

        @media (max-width: 650px) {
            .radio-group {
                border-left: none;
                padding-left: 0;
                width: 100%;
                padding-top: 10px;
                border-top: 1px solid var(--border-color);
            }
        }

        /* Text Area Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 650px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        textarea {
            width: 100%;
            height: 220px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            resize: none;
            font-size: 1rem;
            color: var(--text-main);
            background-color: var(--bg-input);
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Counter / Statistik Teks */
        .counter-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
            padding: 0 4px;
        }

        /* Aksi Utama */
        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        button.btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-clear {
            background-color: var(--accent-red-bg);
            color: var(--accent-red);
        }

        .btn-clear:hover {
            background-color: var(--accent-red-hover);
        }

        .btn-copy {
            background-color: var(--primary);
            color: #0f172a;
        }

        .btn-copy:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
        }

        /* Notifikasi Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            z-index: 999;
        }

        #toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
    </style>
</head>
<body data-theme="light">

    <div class="container">
        <div class="header-area">
            <h1>Text Purifier <span class="version-badge">v1.1.0</span></h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
        </div>

        <div class="options-panel">
            <div class="options-title">Pengaturan Pembersihan</div>
            <div class="options-grid">
                <label class="checkbox-group">
                    <input type="checkbox" id="keepSpaces" checked> Pertahankan Spasi
                </label>
                <label class="checkbox-group">
                    <input type="checkbox" id="removeNumbers"> Hapus Angka
                </label>
                
                <div class="radio-group">
                    <label class="checkbox-group">
                        <input type="radio" name="textCase" value="normal" checked> Normal
                    </label>
                    <label class="checkbox-group">
                        <input type="radio" name="textCase" value="upper"> BESAR
                    </label>
                    <label class="checkbox-group">
                        <input type="radio" name="textCase" value="lower"> kecil
                    </label>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="input-group">
                <label for="inputText">Teks Asli</label>
                <textarea id="inputText" placeholder="Ketik atau tempel teks penuh simbol di sini..."></textarea>
                <div class="counter-bar">
                    <span id="srcChars">0 Karakter</span>
                    <span id="srcWords">0 Kata</span>
                </div>
            </div>
            <div class="input-group">
                <label for="outputText">Hasil Bersih</label>
                <textarea id="outputText" readonly placeholder="Hasil teks bersih otomatis muncul di sini..."></textarea>
                <div class="counter-bar">
                    <span id="outChars">0 Karakter</span>
                    <span id="outWords">0 Kata</span>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-clear" onclick="clearText()">Hapus Semua</button>
            <button class="btn btn-copy" onclick="copyText()">Salin Hasil</button>
        </div>
    </div>

    <div id="toast">Teks berhasil disalin! ✅</div>

    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const keepSpaces = document.getElementById('keepSpaces');
        const removeNumbers = document.getElementById('removeNumbers');
        const caseOptions = document.getElementsByName('textCase');
        const toast = document.getElementById('toast');
        const body = document.body;
        const themeBtn = document.getElementById('themeBtn');

        // Fungsi Penghitung Statistik Teks
        function updateStats(text, charId, wordId) {
            const charCount = text.length;
            const wordCount = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
            
            document.getElementById(charId).innerText = `${charCount} Karakter`;
            document.getElementById(wordId).innerText = `${wordCount} Kata`;
        }

        // Fungsi Utama Pembersih Teks
        function purifyText() {
            let text = inputText.value;

            // Membangun Regex dinamis berdasarkan opsi pilihan
            let regexStr = '[^a-zA-Z';
            if (!removeNumbers.checked) regexStr += '0-9';
            if (keepSpaces.checked) regexStr += '\\s';
            regexStr += ']';
            
            const regex = new RegExp(regexStr, 'g');
            let cleanedText = text.replace(regex, '');

            // Mengatur Kapitalisasi Teks (Case)
            let selectedCase = 'normal';
            for (const radio of caseOptions) {
                if (radio.checked) {
                    selectedCase = radio.value;
                    break;
                }
            }

            if (selectedCase === 'upper') {
                cleanedText = cleanedText.toUpperCase();
            } else if (selectedCase === 'lower') {
                cleanedText = cleanedText.toLowerCase();
            }

            outputText.value = cleanedText;

            // Perbarui statistik kedua sisi halaman
            updateStats(text, 'srcChars', 'srcWords');
            updateStats(cleanedText, 'outChars', 'outWords');
        }

        // Event Listeners untuk pemrosesan instan (real-time)
        inputText.addEventListener('input', purifyText);
        keepSpaces.addEventListener('change', purifyText);
        removeNumbers.addEventListener('change', purifyText);
        caseOptions.forEach(radio => radio.addEventListener('change', purifyText));

        // Fungsi Menghapus Teks
        function clearText() {
            inputText.value = '';
            outputText.value = '';
            purifyText();
            inputText.focus();
        }

        // Fungsi Menyalin Hasil ke Clipboard
        function copyText() {
            if (outputText.value === '') return;
            navigator.clipboard.writeText(outputText.value).then(() => {
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2500);
            });
        }

        // Fungsi Toggle Dark / Light Theme
        function toggleTheme() {
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                themeBtn.innerHTML = '☀️ Light Mode';
            } else {
                body.setAttribute('data-theme', 'light');
                themeBtn.innerHTML = '🌙 Dark Mode';
            }
        }
    </script>
</body>
</html>
