<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Purifier Pro | v1.6.0</title>
    <!-- Memuat Library jsPDF untuk fitur Ekspor PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #e0e6ed;
            --bg-input: #f8fafc;
            --primary: #3498db;
            --primary-hover: #2980b9;
            --success: #10b981;
            --success-hover: #059669;
            --pdf-color: #8b5cf6;
            --pdf-hover: #7c3aed;
            --accent-red: #e74c3c;
            --accent-red-bg: #ffeaea;
            --accent-red-hover: #ffcece;
            --shadow: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --bg-input: #0f172a;
            --primary: #38bdf8;
            --primary-hover: #7dd3fc;
            --success: #34d399;
            --success-hover: #10b981;
            --pdf-color: #a78bfa;
            --pdf-hover: #8b5cf6;
            --accent-red: #f87171;
            --accent-red-bg: #451a1a;
            --accent-red-hover: #652222;
            --shadow: rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--bg-card);
            width: 100%;
            max-width: 1150px;
            border-radius: 16px;
            box-shadow: 0 10px 30px var(--shadow);
            padding: 30px;
            position: relative;
        }

        /* Header & Theme Toggle */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .version-badge {
            font-size: 0.75rem;
            background: var(--primary);
            color: #0f172a;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
            vertical-align: middle;
            margin-left: 8px;
        }

        .theme-toggle {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Opsi Konfigurasi */
        .options-panel {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: flex-start;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .options-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 20px;
        }

        .checkbox-group, .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .radio-group {
            display: flex;
            gap: 15px;
        }

        /* Custom Inputs */
        .flex-tools {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mini-input {
            width: 110px;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 0.85rem;
        }

        .mini-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .wide-input {
            width: 180px;
        }

        /* Text Area Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        label.main-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .tools-group {
            display: flex;
            gap: 8px;
        }

        .small-btn {
            font-size: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .small-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .mic-btn.listening {
            background-color: var(--accent-red-bg);
            color: var(--accent-red);
            border-color: var(--accent-red);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        textarea {
            width: 100%;
            height: 280px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            resize: none;
            font-size: 1rem;
            color: var(--text-main);
            background-color: var(--bg-input);
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .counter-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
            padding: 0 4px;
        }

        .autosave-badge {
            color: var(--success);
            font-size: 0.75rem;
            font-weight: 500;
            display: none;
        }

        /* Dashboard Analisis Kata */
        .density-panel {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            margin-top: 25px;
        }

        .density-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .word-badge {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .word-count {
            background: var(--primary);
            color: #0f172a;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* Aksi Utama */
        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .action-right {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button.btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-clear { background-color: var(--accent-red-bg); color: var(--accent-red); }
        .btn-clear:hover { background-color: var(--accent-red-hover); }

        .btn-copy { background-color: var(--primary); color: #0f172a; }
        .btn-copy:hover { background-color: var(--primary-hover); }

        .btn-download { background-color: var(--success); color: white; }
        .btn-download:hover { background-color: var(--success-hover); }

        .btn-pdf { background-color: var(--pdf-color); color: white; }
        .btn-pdf:hover { background-color: var(--pdf-hover); }

        /* Notifikasi Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            z-index: 999;
        }
        #toast.show { opacity: 1; visibility: visible; transform: translateY(0); }
    </style>
</head>
<body data-theme="light">

    <div class="container">
        <div class="header-area">
            <h1>Text Purifier <span class="version-badge">v1.6.0</span></h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
        </div>

        <div class="options-panel">
            <div class="options-group">
                <div class="options-title">Filter & Efek Utama</div>
                <div class="checkbox-grid">
                    <label class="checkbox-group"><input type="checkbox" id="keepSpaces" checked> Pertahankan Spasi</label>
                    <label class="checkbox-group"><input type="checkbox" id="removeNumbers"> Hapus Angka</label>
                    <label class="checkbox-group"><input type="checkbox" id="removeEmptyLines"> Hapus Baris Kosong</label>
                    <label class="checkbox-group"><input type="checkbox" id="collapseSpaces"> Hapus Spasi Ganda</label>
                    <label class="checkbox-group" style="color: var(--primary); font-weight: 500;"><input type="checkbox" id="reverseText"> 🔄 Balikkan Teks</label>
                </div>
            </div>

            <div class="options-group">
                <div class="options-title">Format Huruf</div>
                <div class="radio-group">
                    <label><input type="radio" name="textCase" value="normal" checked> Normal</label>
                    <label><input type="radio" name="textCase" value="upper"> BESAR</label>
                    <label><input type="radio" name="textCase" value="lower"> kecil</label>
                </div>
            </div>

            <div class="options-group">
                <div class="options-title">Pengecualian & Sensor</div>
                <input type="text" id="exceptionsText" placeholder="Pengecualian: , . @" class="mini-input wide-input" title="Simbol yang diketik di sini TIDAK akan dihapus">
                <input type="text" id="profanityText" placeholder="Sensor Kata: rahasia, kasar" class="mini-input wide-input" style="margin-top: 8px;" title="Kata yang dimasukkan di sini akan otomatis diubah menjadi ***">
            </div>

            <div class="options-group">
                <div class="options-title">Cari & Ganti</div>
                <div class="flex-tools">
                    <input type="text" id="findText" placeholder="Cari" class="mini-input">
                    <span style="color: var(--text-muted);">➔</span>
                    <input type="text" id="replaceText" placeholder="Ganti" class="mini-input">
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="input-group">
                <div class="input-header">
                    <label class="main-label">Teks Asli <span id="autosaveBadge" class="autosave-badge">(Tersimpan ✔)</span></label>
                    <div class="tools-group">
                        <button class="small-btn mic-btn" id="micBtn" onclick="toggleMic()">🎙️ Dikte</button>
                        <label for="fileUpload" class="small-btn">📂 .txt</label>
                        <input type="file" id="fileUpload" accept=".txt" style="display: none;">
                    </div>
                </div>
                <textarea id="inputText" placeholder="Ketik, tempel, gunakan suara, atau unggah file teks Anda di sini..."></textarea>
                <div class="counter-bar">
                    <span id="srcChars">0 Karakter</span>
                    <span id="srcWords">0 Kata</span>
                </div>
            </div>
            
            <div class="input-group">
                <div class="input-header">
                    <label class="main-label">Hasil Bersih</label>
                </div>
                <textarea id="outputText" readonly placeholder="Hasil teks bersih otomatis muncul di sini..."></textarea>
                <div class="counter-bar">
                    <span id="outChars">0 Karakter</span>
                    <span id="outWords">0 Kata</span>
                </div>
            </div>
        </div>

        <!-- Panel Kepadatan Kata -->
        <div class="density-panel">
            <div class="options-title">📊 Analisis Kepadatan Kata (Top 5 Paling Sering Muncul)</div>
            <div id="wordDensityList" class="density-list">
                <span style="color: var(--text-muted); font-size: 0.85rem;">Belum ada data teks untuk dianalisis.</span>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-clear" onclick="clearText()">Hapus Semua</button>
            <div class="action-right">
                <button class="btn btn-copy" onclick="copyText()">Salin Teks</button>
                <button class="btn btn-download" onclick="downloadText()">⬇️ Unduh .txt</button>
                <button class="btn btn-pdf" onclick="downloadPDF()">🖨️ Ekspor PDF</button>
            </div>
        </div>
    </div>

    <div id="toast">Teks berhasil disalin! ✅</div>

    <script>
        // Deklarasi Elemen
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const keepSpaces = document.getElementById('keepSpaces');
        const removeNumbers = document.getElementById('removeNumbers');
        const removeEmptyLines = document.getElementById('removeEmptyLines');
        const collapseSpaces = document.getElementById('collapseSpaces');
        const reverseText = document.getElementById('reverseText');
        const caseOptions = document.getElementsByName('textCase');
        const exceptionsText = document.getElementById('exceptionsText');
        const profanityText = document.getElementById('profanityText');
        const findText = document.getElementById('findText');
        const replaceText = document.getElementById('replaceText');
        const fileUpload = document.getElementById('fileUpload');
        const wordDensityList = document.getElementById('wordDensityList');
        const toast = document.getElementById('toast');
        const autosaveBadge = document.getElementById('autosaveBadge');
        const body = document.body;
        const themeBtn = document.getElementById('themeBtn');
        const micBtn = document.getElementById('micBtn');

        // Fitur Autosave & Theme Loader
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('tp_theme') === 'dark') toggleTheme();
            if (localStorage.getItem('tp_text')) {
                inputText.value = localStorage.getItem('tp_text');
                purifyText();
            }
        });

        const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

        // Fungsi Penghitung Statistik
        function updateStats(text, charId, wordId) {
            const charCount = text.length;
            const wordCount = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
            document.getElementById(charId).innerText = `${charCount} Karakter`;
            document.getElementById(wordId).innerText = `${wordCount} Kata`;
        }

        // Fungsi Menganalisis Kepadatan Kata
        function updateWordDensity(text) {
            wordDensityList.innerHTML = '';
            const words = text.toLowerCase().match(/\b[a-zA-Z0-9À-ÿ']+\b/g);
            
            if (!words || words.length === 0) {
                wordDensityList.innerHTML = '<span style="color: var(--text-muted); font-size: 0.85rem;">Belum ada data teks untuk dianalisis.</span>';
                return;
            }

            const freqMap = {};
            words.forEach(word => {
                if(word.length > 1 && !word.includes('*')) {
                    freqMap[word] = (freqMap[word] || 0) + 1;
                }
            });

            const sortedWords = Object.keys(freqMap).map(key => [key, freqMap[key]]).sort((a, b) => b[1] - a[1]);
            const topFive = sortedWords.slice(0, 5);

            if(topFive.length === 0) {
                wordDensityList.innerHTML = '<span style="color: var(--text-muted); font-size: 0.85rem;">Ketik kata yang lebih panjang untuk melihat statistik.</span>';
                return;
            }

            topFive.forEach(([word, count]) => {
                const badge = document.createElement('span');
                badge.className = 'word-badge';
                badge.innerHTML = `${word} <span class="word-count">${count}x</span>`;
                wordDensityList.appendChild(badge);
            });
        }

        // Fungsi Utama Pembersih Teks
        function purifyText() {
            let text = inputText.value;

            localStorage.setItem('tp_text', text);
            autosaveBadge.style.display = text ? 'inline' : 'none';

            // Cari & Ganti
            const findStr = findText.value;
            const repStr = replaceText.value;
            if (findStr) {
                const findRegex = new RegExp(escapeRegExp(findStr), 'g');
                text = text.replace(findRegex, repStr);
            }

            // Hapus Baris Kosong
            if (removeEmptyLines.checked) text = text.replace(/^\s*[\r\n]/gm, '');

            // Membangun Regex Filter Simbol
            let regexStr = '[^a-zA-Z';
            if (!removeNumbers.checked) regexStr += '0-9';
            if (keepSpaces.checked) regexStr += '\\s';
            
            const exceptions = exceptionsText.value.replace(/\s+/g, ''); 
            if (exceptions) regexStr += escapeRegExp(exceptions);
            regexStr += ']';
            
            const regex = new RegExp(regexStr, 'g');
            let cleanedText = text.replace(regex, '');

            // Hapus Spasi Ganda
            if (collapseSpaces.checked) cleanedText = cleanedText.replace(/[ \t]+/g, ' ');

            // Sensor Kata
            const profanityStr = profanityText.value;
            if (profanityStr) {
                const badWords = profanityStr.split(',').map(w => w.trim()).filter(w => w.length > 0);
                badWords.forEach(word => {
                    try {
                        const badRegex = new RegExp(`\\b${escapeRegExp(word)}\\b`, 'gi');
                        cleanedText = cleanedText.replace(badRegex, '*'.repeat(word.length));
                    } catch(e) {}
                });
            }

            // Pembalik Teks
            if (reverseText.checked) cleanedText = cleanedText.split('').reverse().join('');

            // Kapitalisasi Teks
            let selectedCase = 'normal';
            for (const radio of caseOptions) {
                if (radio.checked) { selectedCase = radio.value; break; }
            }
            if (selectedCase === 'upper') cleanedText = cleanedText.toUpperCase();
            else if (selectedCase === 'lower') cleanedText = cleanedText.toLowerCase();

            outputText.value = cleanedText;

            // Update UI
            updateStats(text, 'srcChars', 'srcWords');
            updateStats(cleanedText, 'outChars', 'outWords');
            updateWordDensity(cleanedText);
        }

        // Event Listeners Input
        const allInputs = [inputText, exceptionsText, profanityText, findText, replaceText, keepSpaces, removeNumbers, removeEmptyLines, collapseSpaces, reverseText];
        allInputs.forEach(el => el.addEventListener('input', purifyText));
        caseOptions.forEach(radio => radio.addEventListener('change', purifyText));

        // Setup Speech to Text (Web Speech API)
        let isListening = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'id-ID';

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                micBtn.innerHTML = '🔴 Rekam';
                showToast("Mikrofon aktif. Silakan bicara 🎙️");
            };

            recognition.onresult = (event) => {
                let currentText = inputText.value;
                const transcript = event.results[event.results.length - 1][0].transcript;
                inputText.value = currentText + (currentText.endsWith(' ') || currentText === '' ? '' : ' ') + transcript;
                purifyText();
            };

            recognition.onerror = () => {
                showToast("Kesalahan mikrofon ❌");
                if (isListening) toggleMic();
            };

            recognition.onend = () => {
                if(isListening) {
                    recognition.start(); // Terus mendengarkan sampai distop manual
                } else {
                    micBtn.classList.remove('listening');
                    micBtn.innerHTML = '🎙️ Dikte';
                }
            };
        } else {
            micBtn.style.display = 'none'; // Sembunyikan jika browser tidak mendukung
        }

        function toggleMic() {
            if(!SpeechRecognition) return showToast("Browser tidak mendukung Dikte Suara ❌");
            
            if(isListening) {
                isListening = false;
                recognition.stop();
                micBtn.classList.remove('listening');
                micBtn.innerHTML = '🎙️ Dikte';
                showToast("Mikrofon dimatikan 🛑");
            } else {
                recognition.start();
            }
        }

        // Fitur Baca File Upload .txt
        fileUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                inputText.value = e.target.result;
                purifyText();
                showToast("File berhasil dimuat! 📂");
            };
            reader.readAsText(file);
        });

        // Fitur Download .txt
        function downloadText() {
            const text = outputText.value;
            if (!text) return showToast("Tidak ada teks untuk diunduh ❌");
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'teks_bersih.txt';
            a.click();
            showToast("File TXT berhasil diunduh! ⬇️");
        }

        // Fitur Download .pdf (menggunakan jsPDF)
        function downloadPDF() {
            if (typeof window.jspdf === 'undefined') {
                return showToast("Pustaka PDF sedang dimuat, coba lagi ⏳");
            }
            const text = outputText.value;
            if (!text) return showToast("Tidak ada teks untuk diekspor ❌");

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFont("helvetica", "normal");
            doc.setFontSize(12);
            
            // Bungkus teks agar tidak terpotong di tepi kertas
            const lines = doc.splitTextToSize(text, 180);
            let cursorY = 20;

            // Cetak per baris, tambah halaman jika penuh
            for (let i = 0; i < lines.length; i++) {
                if (cursorY > 280) {
                    doc.addPage();
                    cursorY = 20;
                }
                doc.text(lines[i], 15, cursorY);
                cursorY += 7; // Tinggi antar baris
            }

            doc.save("Dokumen_Teks_Bersih.pdf");
            showToast("File PDF berhasil dibuat! 🖨️");
        }

        // Fungsi Menghapus Teks
        function clearText() {
            inputText.value = '';
            outputText.value = '';
            findText.value = '';
            replaceText.value = '';
            profanityText.value = '';
            fileUpload.value = '';
            if (isListening) toggleMic();
            localStorage.removeItem('tp_text');
            autosaveBadge.style.display = 'none';
            purifyText();
            inputText.focus();
        }

        // Fungsi Copy
        function copyText() {
            if (outputText.value === '') return;
            navigator.clipboard.writeText(outputText.value).then(() => {
                showToast("Teks berhasil disalin! ✅");
            });
        }

        // Notifikasi Toast
        function showToast(message) {
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        // Toggle Tema Dark/Light
        function toggleTheme() {
            const isLight = body.getAttribute('data-theme') === 'light';
            body.setAttribute('data-theme', isLight ? 'dark' : 'light');
            themeBtn.innerHTML = isLight ? '☀️ Light Mode' : '🌙 Dark Mode';
            localStorage.setItem('tp_theme', isLight ? 'dark' : 'light');
        }
    </script>
</body>
</html>
