<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Purifier Pro | v3.0.4</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="script.js" defer></script>
</head>
<body data-theme="light">

    <div class="container">
        <div class="header-area">
            <h1>Text Purifier <span class="version-badge">v3.0.4 Pro</span></h1>
            <div class="header-controls">
                <button class="theme-toggle" onclick="changeFontSize(1)" title="Perbesar Teks">🔎 A+</button>
                <button class="theme-toggle" onclick="changeFontSize(-1)" title="Perkecil Teks">🔎 A-</button>
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
            </div>
        </div>

        <div class="options-panel">
            <div class="options-group">
                <div class="options-title">⚡ Cepat & Otomatis</div>
                <select id="presetSelect" class="mini-input wide-input" onchange="applyPreset()">
                    <option value="custom">Kustom (Manual)</option>
                    <option value="cleanall">Bersihkan Semua</option>
                    <option value="keepnum">Pertahankan Angka</option>
                    <option value="stripspaces">Hapus Semua Spasi</option>
                </select>
                <label class="checkbox-group" style="color: var(--success); font-weight: 600; margin-top: 8px;">
                    <input type="checkbox" id="autoCopy"> 📋 Auto-Salin Teks
                </label>
            </div>

            <div class="options-group">
                <div class="options-title">Filter Utama</div>
                <div class="checkbox-grid">
                    <label class="checkbox-group"><input type="checkbox" id="keepSpaces" checked> Pertahankan Spasi</label>
                    <label class="checkbox-group"><input type="checkbox" id="removeNumbers"> Hapus Angka</label>
                    <label class="checkbox-group"><input type="checkbox" id="removeEmptyLines"> Hapus Baris Kosong</label>
                    <label class="checkbox-group"><input type="checkbox" id="collapseSpaces"> Hapus Spasi Ganda</label>
                    <label class="checkbox-group" style="color: var(--primary); font-weight: 500;"><input type="checkbox" id="reverseText"> 🔄 Balikkan Teks</label>
                </div>
            </div>

            <div class="options-group">
                <div class="options-title">Pencarian & Simbol</div>
                <div class="flex-tools">
                    <input type="text" id="findText" placeholder="Cari kata..." class="mini-input">
                    <span style="color: var(--text-muted);">➔</span>
                    <input type="text" id="replaceText" placeholder="Ganti..." class="mini-input" style="width: 80px;">
                </div>
                <div class="flex-tools" style="margin-top: 8px;">
                    <input type="text" id="findSymbol" placeholder="Simbol: @ # $" class="mini-input">
                    <span style="color: var(--text-muted);">➔</span>
                    <input type="text" id="replaceSymbol" placeholder="Ganti..." class="mini-input" style="width: 80px;">
                </div>
            </div>

            <div class="options-group">
                <div class="options-title">🔠 Transformasi</div>
                <div class="radio-group" style="margin-bottom: 8px;">
                    <label><input type="radio" name="textCase" value="normal" checked> Normal</label>
                    <label><input type="radio" name="textCase" value="upper"> UPPER</label>
                    <label><input type="radio" name="textCase" value="lower"> lower</label>
                    <label><input type="radio" name="textCase" value="title"> Title</label>
                </div>
                <input type="text" id="profanityText" placeholder="Sensor kata: kasar, rahasia" class="mini-input wide-input">
            </div>

            <div class="options-group" style="flex-grow: 1;">
                <div class="options-title">💻 Developer Tools</div>
                <div class="dev-tools-grid">
                    <button class="small-btn" onclick="setTransformMode('b64-enc')">B64 Enc 🔒</button>
                    <button class="small-btn" onclick="setTransformMode('b64-dec')">B64 Dec 🔓</button>
                    <button class="small-btn" onclick="setTransformMode('url-enc')">URL Enc 🔗</button>
                    <button class="small-btn" onclick="setTransformMode('url-dec')">URL Dec 🔗</button>
                    
                    <button class="small-btn" onclick="setTransformMode('json-min')">JSON Min 📦</button>
                    <button class="small-btn" onclick="setTransformMode('json-beau')">JSON Beau ✨</button>
                    <button class="small-btn" onclick="setTransformMode('css-min')">CSS Min 🎨</button>
                    <button class="small-btn" onclick="setTransformMode('css-beau')">CSS Beau ✨</button>
                    
                    <button class="small-btn reset-btn-wide" onclick="setTransformMode('none')" style="color:var(--accent-red); border-color:var(--accent-red);">✖ Reset Mode Dev</button>
                </div>
                <input type="hidden" id="transformMode" value="none">
            </div>
        </div>

        <div class="flex-tools" style="margin-bottom: 20px; justify-content: flex-end;">
            <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">Batas Pemotongan Karakter:</label>
            <input type="number" id="charLimit" placeholder="280" class="mini-input number-input" min="1">
        </div>

        <div class="grid">
            <div class="input-group">
                <div class="input-header">
                    <label class="main-label">Input / Data Mentah <span id="autosaveBadge" class="autosave-badge">(Tersimpan ✔)</span></label>
                    <div class="tools-group">
                        <button class="small-btn mic-btn" id="micBtn" onclick="toggleMic()">🎙️ Dikte</button>
                        <label for="fileUpload" class="small-btn">📂 .txt/.json/.css</label>
                        <input type="file" id="fileUpload" accept=".txt,.json,.css,.js" style="display: none;">
                    </div>
                </div>
                <textarea id="inputText" placeholder="Ketik, tempel text, paste JSON, atau CSS Anda di sini..."></textarea>
                <div class="counter-bar">
                    <div>
                        <span id="srcChars">0 Karakter</span> | <span id="srcWords">0 Kata</span>
                    </div>
                </div>
            </div>
            
            <div class="input-group">
                <div class="input-header">
                    <label class="main-label">Output <span id="modeStatusBadge" style="color: var(--primary); font-size: 0.8rem; font-weight: normal; margin-left: 8px;"></span></label>
                    <div class="tools-group">
                        <button class="small-btn truncate-btn" id="truncateBtn" onclick="smartTruncate()">✂️ Potong Pintar</button>
                        <button class="small-btn" id="speakBtn" onclick="toggleSpeak()">🔊 Dengarkan</button>
                    </div>
                </div>
                <textarea id="outputText" readonly placeholder="Hasil format atau teks bersih otomatis muncul di sini..."></textarea>
                <div class="counter-bar">
                    <div>
                        <span id="outChars">0 Karakter</span> | <span id="outWords">0 Kata</span>
                    </div>
                    <span id="readTime" class="reading-time">⏱️ 0 dtk waktu baca</span>
                </div>
            </div>
        </div>

        <div class="panels-grid">
            <div class="data-panel">
                <div class="options-title">📊 Kepadatan Kata (Top 5)</div>
                <div id="wordDensityList" class="density-list">
                    <span style="color: var(--text-muted); font-size: 0.85rem;">Belum ada data.</span>
                </div>
            </div>

            <div class="data-panel">
                <div class="options-title">🕰️ Riwayat Teks (5 Terakhir)</div>
                <div id="historyList" class="history-list"></div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-clear" onclick="clearText()">Hapus Semua</button>
            <div class="action-right">
                <button class="btn btn-save" onclick="saveToHistory()">💾 Simpan Riwayat</button>
                <button class="btn btn-copy" onclick="copyText()">Salin Teks</button>
                <button class="btn btn-download" onclick="downloadText()">⬇️ Unduh File</button>
                <button class="btn btn-pdf" onclick="downloadPDF()">🖨️ Ekspor PDF</button>
            </div>
        </div>

        <div class="app-footer">
            <div class="author-text">
                Dibuat dengan ❤️ oleh <span class="author-name">Sulfikar</span>
            </div>

            </div>
        </div>

    </div>

</body>
</html>
